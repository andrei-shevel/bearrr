services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SITE_URL: ${SITE_URL}
        NEXT_PUBLIC_MIXPANEL_TOKEN: ${NEXT_PUBLIC_MIXPANEL_TOKEN:-}
        NEXT_PUBLIC_MIXPANEL_API_HOST: ${NEXT_PUBLIC_MIXPANEL_API_HOST:-}

    environment:
      SITE_URL: ${SITE_URL}

    ports:
      - '127.0.0.1:${PORT:-3000}:3000'

    restart: unless-stopped
